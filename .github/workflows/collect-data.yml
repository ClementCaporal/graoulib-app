name: Collect Bike Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: collect-bike-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync environment
        run: uv sync

      - name: Collect snapshot
        run: uv run python scripts/collect_snapshot.py

      - name: Build site data
        run: uv run python scripts/build_site_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_snapshot.json data/history docs/data/all_series.json docs/data/today_series.json docs/data/latest_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): update bike station snapshots"
          git push
